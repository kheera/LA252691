services:
  server:
    build:
      context: ./server
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Introspection is disabled by default in production; set to 'false' to enable
      DISABLE_INTROSPECTION: ${DISABLE_INTROSPECTION:-true}

  client:
    build:
      context: ./client
      args:
        # Vite inlines these at build time — sourced from .env via compose
        VITE_GRAPHQL_URL: ${VITE_GRAPHQL_URL:-http://localhost:4000/graphql}
        VITE_API_KEY: ${VITE_API_KEY}
    ports:
      - "3000:80"
    depends_on:
      - server
